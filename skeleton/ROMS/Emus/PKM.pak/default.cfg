minarch_screen_scaling = Native
minarch_screen_sharpness = Crisp
minarch_prevent_tearing = Lenient
minarch_cpu_speed = Normal

pokemini_video_scale = 6x
pokemini_lcdfilter = dotmatrix
pokemini_lcdmode = analog
pokemini_lcdcontrast = 64
pokemini_lcdbright = 20
pokemini_palette = Default
pokemini_piezofilter = disabled
pokemini_lowpass_filter = enabled
pokemini_lowpass_range = 60
pokemini_screen_shake_lv = 3
pokemini_rumble_lv = 10
-pokemini_60hz_mode = enabled

bind Up = UP
bind Down = DOWN
bind Left = LEFT
bind Right = RIGHT
bind A Button = A
bind B Button = B
bind C Button = R1
bind Shake = L1
bind Power = SELECT
